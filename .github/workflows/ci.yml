name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Trigger on tags starting with v (e.g., v1.0.0)
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for the action to create a release

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint

    - name: Build project
      run: npm run build

    - name: Create Zip Archive
      run: |
        cd dist
        zip -r ../ombre-ai-extension.zip .
      
    - name: Upload Extension Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ombre-ai-extension
        path: ombre-ai-extension.zip
        retention-days: 14

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ombre-ai-extension.zip
        generate_release_notes: true
